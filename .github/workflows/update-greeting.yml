

name: Update time-based greeting

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update greeting in README
        run: python3 update_greeting.py

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update time-based greeting"
          git pull --rebase origin main
          git push
