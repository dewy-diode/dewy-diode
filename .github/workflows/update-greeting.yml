# Optional bonus, paired with update_greeting.py.
#
# WHERE THIS FILE GOES: it must live at this exact path in your repo:
#   .github/workflows/update-greeting.yml
# (GitHub only looks for workflows in that specific folder.)
#
# What it does: every 3 hours, it runs update_greeting.py, which rewrites
# the greeting line in README.md to match the current time, then commits
# the change if anything actually changed. You can also trigger it by hand
# from the repo's "Actions" tab at any time.

name: Update time-based greeting

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update greeting in README
        run: python3 update_greeting.py

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update time-based greeting"
          git push
